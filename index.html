<!doctype html>
<html lang="en" class="hide-hud">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05040b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Song of the Night" />
    <title>Song of the Night PWA</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <canvas id="glcanvas" aria-label="Song of the Night WebGL scene"></canvas>

      <div class="hud" hidden aria-hidden="true">
        <div class="hud-card">
          <strong>Song of the Night</strong>
          <span>Installable PWA • WebGL • Gamepad + touch</span>
        </div>
        <div class="hud-card hud-actions">
          <button id="installButton" hidden>Install App</button>
          <button id="recenterButton">Re-center</button>
        </div>
      </div>

      <div class="pad-stack" hidden aria-hidden="true">
        <div class="joystick" id="leftJoy">
          <div class="joystick-knob" id="leftKnob"></div>
        </div>
        <div class="joystick" id="rightJoy">
          <div class="joystick-knob" id="rightKnob" opacity=0></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
